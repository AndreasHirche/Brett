<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Brett</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #video-wrap {
      width: 100%;
      max-width: 900px;
      position: relative;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
    }

    video {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
      object-fit: contain;
    }

    #snap {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 2;
    }

    #meter {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 10px;
      padding: 28px 0 24px;
      height: 110px;
    }

    .bar {
      width: 36px;
      border-radius: 3px 3px 0 0;
      background: #222;
      position: relative;
      transition: background 0.08s, box-shadow 0.08s;
    }

    .bar:nth-child(1) { height: 25%; }
    .bar:nth-child(2) { height: 45%; }
    .bar:nth-child(3) { height: 62%; }
    .bar:nth-child(4) { height: 80%; }
    .bar:nth-child(5) { height: 100%; }

    .bar.filled:nth-child(1),
    .bar.filled:nth-child(2) { background: #2ecc71; }
    .bar.filled:nth-child(3),
    .bar.filled:nth-child(4) { background: #f39c12; }
    .bar.filled:nth-child(5) { background: #e74c3c; }

    .bar.current:nth-child(1),
    .bar.current:nth-child(2) { background: #2ecc71; box-shadow: 0 0 12px #2ecc71aa; }
    .bar.current:nth-child(3),
    .bar.current:nth-child(4) { background: #f39c12; box-shadow: 0 0 12px #f39c12aa; }
    .bar.current:nth-child(5) { background: #e74c3c; box-shadow: 0 0 16px #e74c3ccc; }

    #hint {
      color: #444;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      letter-spacing: 0.06em;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div id="video-wrap">
    <video id="vid" playsinline preload="auto"></video>
    <canvas id="snap"></canvas>
  </div>

  <div id="meter">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

  <p id="hint">Halten zum Laden &nbsp;·&nbsp; Loslassen zum Spielen</p>

  <script>
    const vid     = document.getElementById('vid');
    const snap    = document.getElementById('snap');
    const snapCtx = snap.getContext('2d');
    const bars    = document.querySelectorAll('.bar');
    const STEP    = 220;

    function videoForLevel(lv) {
      if (lv <= 2) return 'B1.mp4';
      if (lv <= 4) return 'B2.mp4';
      return 'B3.mp4';
    }

    let level     = 0;
    let direction = 1;
    let ticker    = null;
    let holding   = false;
    let generation = 0; // invalidates stale async callbacks on new interaction

    // --- Snapshot overlay: covers the video during src-switch to avoid black flash ---
    function captureSnap() {
      snap.width  = snap.offsetWidth;
      snap.height = snap.offsetHeight;
      if (vid.videoWidth > 0) {
        const vw = vid.videoWidth, vh = vid.videoHeight;
        const sw = snap.width,     sh = snap.height;
        const scale = Math.min(sw / vw, sh / vh);
        const dw = vw * scale, dh = vh * scale;
        snapCtx.fillStyle = '#000';
        snapCtx.fillRect(0, 0, sw, sh);
        snapCtx.drawImage(vid, (sw - dw) / 2, (sh - dh) / 2, dw, dh);
      }
      snap.style.opacity = '1';
    }

    function releaseSnap() {
      snap.style.opacity = '0';
    }

    // --- Audio ---
    let audioCtx   = null;
    let chargeOsc  = null;
    let chargeLFO  = null;
    let chargeGain = null;

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function startChargeSound() {
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') ctx.resume();

      chargeGain = ctx.createGain();
      chargeGain.gain.setValueAtTime(0, ctx.currentTime);
      chargeGain.gain.linearRampToValueAtTime(0.25, ctx.currentTime + 0.15);
      chargeGain.connect(ctx.destination);

      chargeOsc = ctx.createOscillator();
      chargeOsc.type = 'sawtooth';
      chargeOsc.frequency.setValueAtTime(80, ctx.currentTime);
      chargeOsc.connect(chargeGain);
      chargeOsc.start();

      const lfoGain = ctx.createGain();
      lfoGain.gain.value = 15;
      chargeLFO = ctx.createOscillator();
      chargeLFO.frequency.value = 10;
      chargeLFO.connect(lfoGain);
      lfoGain.connect(chargeOsc.frequency);
      chargeLFO.start();
    }

    function updateChargeSound(lv) {
      if (!chargeOsc || !audioCtx) return;
      const freq = 80 + (lv - 1) * 130;
      const t = audioCtx.currentTime;
      chargeOsc.frequency.cancelScheduledValues(t);
      chargeOsc.frequency.setValueAtTime(chargeOsc.frequency.value, t);
      chargeOsc.frequency.setTargetAtTime(freq, t, 0.08);
    }

    function stopChargeSound() {
      if (!chargeGain || !audioCtx) return;
      chargeGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
      const osc = chargeOsc, lfo = chargeLFO, gain = chargeGain;
      chargeOsc = null; chargeLFO = null; chargeGain = null;
      setTimeout(() => {
        try { osc.stop(); } catch(e) {}
        try { lfo.stop(); } catch(e) {}
        gain.disconnect();
      }, 300);
    }

    function playOch(gen, onDone) {
      const ctx = getAudioCtx();
      const t = ctx.currentTime, dur = 0.5;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(280, t);
      osc.frequency.exponentialRampToValueAtTime(140, t + dur);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.35, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + dur);
      setTimeout(() => { if (generation === gen) onDone(); }, dur * 1000 + 150);
    }

    function playApplause(gen, onDone) {
      const ctx = getAudioCtx();
      const dur = 2.5, sr = ctx.sampleRate;
      const buf = ctx.createBuffer(1, sr * dur, sr);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        const t = i / sr;
        const env   = Math.pow(Math.max(0, 1 - t / dur), 0.3);
        const burst = 0.5 + 0.5 * Math.sin(t * 2 * Math.PI * 5.5);
        data[i] = (Math.random() * 2 - 1) * env * burst;
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 2500;
      filter.Q.value = 0.3;
      const gain = ctx.createGain();
      gain.gain.value = 0.7;
      src.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      src.start();
      setTimeout(() => { if (generation === gen) onDone(); }, dur * 1000);
    }

    function paint() {
      bars.forEach((b, i) => {
        const barLevel = i + 1;
        b.classList.remove('filled', 'current');
        if (barLevel < level)  b.classList.add('filled');
        if (barLevel === level) b.classList.add('current');
      });
    }

    function goIdle() {
      captureSnap();
      vid.onended   = null;
      vid.oncanplay = null;
      vid.loop      = false;
      vid.muted     = true;
      vid.src       = 'B0.mp4';

      vid.oncanplay = () => {
        vid.oncanplay = null;
        releaseSnap();
        vid.play().catch(() => {});
      };

      vid.onended = () => {
        vid.onended = null;
        if (vid.duration && isFinite(vid.duration))
          vid.currentTime = Math.max(0, vid.duration - 0.05);
      };
    }

    function startHold() {
      if (holding) return;
      generation++;
      vid.onended   = null;
      vid.oncanplay = null;
      releaseSnap();
      holding   = true;
      level     = 1;
      direction = 1;
      paint();
      startChargeSound();

      ticker = setInterval(() => {
        level += direction;
        if (level >= 5) { level = 5; direction = -1; }
        else if (level <= 1) { level = 1; direction = 1; }
        paint();
        updateChargeSound(level);
      }, STEP);
    }

    function endHold() {
      if (!holding) return;
      holding = false;
      clearInterval(ticker);
      ticker = null;
      stopChargeSound();

      const lv  = level;
      const gen = generation;
      level = 0;

      captureSnap();
      vid.onended   = null;
      vid.oncanplay = null;
      vid.loop      = false;
      vid.muted     = false;
      vid.src       = videoForLevel(lv);
      vid.currentTime = 0;

      vid.oncanplay = () => {
        vid.oncanplay = null;
        releaseSnap();
        vid.play().catch(() => {});
      };

      vid.onended = () => {
        vid.onended = null;
        if (vid.duration && isFinite(vid.duration))
          vid.currentTime = Math.max(0, vid.duration - 0.05);
        const playSound = lv <= 2 ? playOch : playApplause;
        playSound(gen, () => goIdle());
      };
    }

    goIdle();

    // ---- events ----
    document.addEventListener('mousedown',  startHold);
    document.addEventListener('mouseup',    endHold);
    document.addEventListener('mouseleave', endHold);

    document.addEventListener('touchstart', e => { e.preventDefault(); startHold(); }, { passive: false });
    document.addEventListener('touchend',   e => { e.preventDefault(); endHold();   }, { passive: false });
    document.addEventListener('touchcancel', endHold);
  </script>
</body>
</html>
