<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Brett</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #video-wrap {
      width: 100%;
      max-width: 900px;
      position: relative;
    }

    video {
      width: 100%;
      display: block;
      border-radius: 4px;
    }

    #meter {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 10px;
      padding: 28px 0 24px;
      height: 110px;
    }

    .bar {
      width: 36px;
      border-radius: 3px 3px 0 0;
      background: #222;
      position: relative;
      transition: background 0.08s, box-shadow 0.08s;
    }

    /* bar heights */
    .bar:nth-child(1) { height: 25%; }
    .bar:nth-child(2) { height: 45%; }
    .bar:nth-child(3) { height: 62%; }
    .bar:nth-child(4) { height: 80%; }
    .bar:nth-child(5) { height: 100%; }

    /* filled (below current) */
    .bar.filled:nth-child(1),
    .bar.filled:nth-child(2) { background: #2ecc71; }

    .bar.filled:nth-child(3),
    .bar.filled:nth-child(4) { background: #f39c12; }

    .bar.filled:nth-child(5) { background: #e74c3c; }

    /* current active bar */
    .bar.current:nth-child(1),
    .bar.current:nth-child(2) {
      background: #2ecc71;
      box-shadow: 0 0 12px #2ecc71aa;
    }

    .bar.current:nth-child(3),
    .bar.current:nth-child(4) {
      background: #f39c12;
      box-shadow: 0 0 12px #f39c12aa;
    }

    .bar.current:nth-child(5) {
      background: #e74c3c;
      box-shadow: 0 0 16px #e74c3ccc;
    }

    #hint {
      color: #444;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      letter-spacing: 0.06em;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div id="video-wrap">
    <video id="vid" playsinline preload="auto" src="Brett0.mp4"></video>
  </div>

  <div id="meter">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

  <p id="hint">Halten zum Laden &nbsp;·&nbsp; Loslassen zum Spielen</p>

  <script>
    const vid   = document.getElementById('vid');
    const bars  = document.querySelectorAll('.bar');
    const STEP  = 220; // ms per level step

    const SOURCES = ['Brett0.mp4', 'Brett0.mp4', 'Brett0.mp4',
                     'Brett1.mp4', 'Brett1.mp4', 'Brett2.mp4'];
    // index 0 unused; index 1-5 maps to level

    let level     = 0;
    let direction = 1;
    let ticker    = null;
    let holding   = false;

    function paint() {
      bars.forEach((b, i) => {
        const barLevel = i + 1;
        b.classList.remove('filled', 'current');
        if (barLevel < level)  b.classList.add('filled');
        if (barLevel === level) b.classList.add('current');
      });
    }

    function startHold() {
      if (holding) return;
      holding   = true;
      level     = 1;
      direction = 1;
      paint();

      ticker = setInterval(() => {
        level += direction;
        if (level >= 5) { level = 5; direction = -1; }
        else if (level <= 1) { level = 1; direction = 1; }
        paint();
      }, STEP);
    }

    function endHold() {
      if (!holding) return;
      holding = false;
      clearInterval(ticker);
      ticker = null;

      const src = SOURCES[level];
      const fullSrc = new URL(src, location.href).href;
      if (vid.src !== fullSrc) {
        vid.src = src;
      }
      vid.currentTime = 0;
      vid.play();
    }

    // ---- events ----
    document.addEventListener('mousedown',  startHold);
    document.addEventListener('mouseup',    endHold);
    document.addEventListener('mouseleave', endHold);

    document.addEventListener('touchstart', e => { e.preventDefault(); startHold(); }, { passive: false });
    document.addEventListener('touchend',   e => { e.preventDefault(); endHold();   }, { passive: false });
    document.addEventListener('touchcancel',endHold);
  </script>
</body>
</html>
