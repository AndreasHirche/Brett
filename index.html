<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Brett</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    /* Row that holds left meter + video + right meter */
    #player-row {
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 900px;
    }

    #video-wrap {
      flex: 1;
      position: relative;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
    }

    video {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
      object-fit: contain;
    }

    #snap {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 2;
    }

    /* TKD command overlay */
    #cmd {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      font-weight: 900;
      font-size: clamp(1.6rem, 5.5vw, 3.8rem);
      letter-spacing: 0.14em;
      color: #fff;
      text-shadow: 0 0 28px rgba(255,255,255,0.35), 0 2px 14px rgba(0,0,0,0.95);
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    #cmd.visible { opacity: 1; }

    /* ── Bottom meter (portrait) ── */
    #meter {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 10px;
      padding: 28px 0 24px;
      height: 110px;
    }

    .bar {
      width: 36px;
      border-radius: 3px 3px 0 0;
      background: #222;
      transition: background 0.08s, box-shadow 0.08s;
    }

    /* Bottom meter bar heights */
    #meter .bar:nth-child(1) { height: 25%; }
    #meter .bar:nth-child(2) { height: 45%; }
    #meter .bar:nth-child(3) { height: 62%; }
    #meter .bar:nth-child(4) { height: 80%; }
    #meter .bar:nth-child(5) { height: 100%; }

    /* ── Side meters (landscape) ── */
    .side-meter {
      display: none;
      flex-direction: column-reverse; /* bar 1 at bottom, bar 5 at top */
      justify-content: center;
      gap: 8px;
      padding: 8px;
      width: 56px;
      align-self: stretch;
    }

    /* Left bars grow rightward (toward video) */
    #meter-left  { align-items: flex-start; }
    /* Right bars grow leftward (toward video) */
    #meter-right { align-items: flex-end; }

    .side-meter .bar {
      height: 14px;
      width: 0; /* overridden per nth-child */
      border-radius: 3px;
    }

    .side-meter .bar:nth-child(1) { width: 25%; }
    .side-meter .bar:nth-child(2) { width: 45%; }
    .side-meter .bar:nth-child(3) { width: 62%; }
    .side-meter .bar:nth-child(4) { width: 80%; }
    .side-meter .bar:nth-child(5) { width: 100%; }

    /* ── Filled / current states — all meters ── */
    .bar.filled:nth-child(1),
    .bar.filled:nth-child(2) { background: #2ecc71; }
    .bar.filled:nth-child(3),
    .bar.filled:nth-child(4) { background: #f39c12; }
    .bar.filled:nth-child(5) { background: #e74c3c; }

    .bar.current:nth-child(1),
    .bar.current:nth-child(2) { background: #2ecc71; box-shadow: 0 0 12px #2ecc71aa; }
    .bar.current:nth-child(3),
    .bar.current:nth-child(4) { background: #f39c12; box-shadow: 0 0 12px #f39c12aa; }
    .bar.current:nth-child(5) { background: #e74c3c; box-shadow: 0 0 16px #e74c3ccc; }

    #hint {
      color: #444;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      letter-spacing: 0.06em;
      margin-top: 4px;
    }

    /* ── Mobile landscape ── */
    @media (orientation: landscape) and (max-height: 600px) {
      body { padding: 0; }

      #player-row {
        width: 100vw;
        height: 100vh;
        max-width: none;
        align-items: stretch;
      }

      #video-wrap {
        aspect-ratio: unset;
        height: 100%;
        border-radius: 0;
      }

      .side-meter { display: flex; }
      #meter      { display: none; }
      #hint       { display: none; }
    }
  </style>
</head>
<body>

  <div id="player-row">
    <div id="meter-left" class="side-meter">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <div id="video-wrap">
      <video id="vid" playsinline preload="auto"></video>
      <canvas id="snap"></canvas>
      <div id="cmd"></div>
    </div>

    <div id="meter-right" class="side-meter">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>

  <div id="meter">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

  <p id="hint">Finger / Maustaste halten zum Kraft sammeln &nbsp;·&nbsp; Loslassen zum Schlagen</p>

  <script>
    const vid      = document.getElementById('vid');
    const snap     = document.getElementById('snap');
    const snapCtx  = snap.getContext('2d');
    const cmd      = document.getElementById('cmd');
    const STEP     = 220;

    const bottomBars = document.querySelectorAll('#meter .bar');
    const leftBars   = document.querySelectorAll('#meter-left .bar');
    const rightBars  = document.querySelectorAll('#meter-right .bar');
    const allBarSets = [bottomBars, leftBars, rightBars];

    function videoForLevel(lv) {
      if (lv <= 2) return 'B1.mp4';
      if (lv <= 4) return 'B2.mp4';
      return 'B3.mp4';
    }

    let level      = 0;
    let direction  = 1;
    let ticker     = null;
    let holding    = false;
    let playing    = false;
    let generation = 0;

    // --- Command overlay ---
    function setCmd(text) {
      cmd.textContent = text;
      cmd.classList.toggle('visible', !!text);
    }

    // --- Snapshot overlay ---
    function captureSnap() {
      snap.width  = snap.offsetWidth;
      snap.height = snap.offsetHeight;
      if (vid.videoWidth > 0) {
        const vw = vid.videoWidth, vh = vid.videoHeight;
        const sw = snap.width,     sh = snap.height;
        const scale = Math.min(sw / vw, sh / vh);
        const dw = vw * scale, dh = vh * scale;
        snapCtx.fillStyle = '#000';
        snapCtx.fillRect(0, 0, sw, sh);
        snapCtx.drawImage(vid, (sw - dw) / 2, (sh - dh) / 2, dw, dh);
      }
      snap.style.opacity = '1';
    }

    function releaseSnap() { snap.style.opacity = '0'; }

    // --- Audio ---
    let audioCtx   = null;
    let chargeOsc  = null;
    let chargeLFO  = null;
    let chargeGain = null;

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function startChargeSound() {
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') ctx.resume();

      chargeGain = ctx.createGain();
      chargeGain.gain.setValueAtTime(0, ctx.currentTime);
      chargeGain.gain.linearRampToValueAtTime(0.25, ctx.currentTime + 0.15);
      chargeGain.connect(ctx.destination);

      chargeOsc = ctx.createOscillator();
      chargeOsc.type = 'sawtooth';
      chargeOsc.frequency.setValueAtTime(80, ctx.currentTime);
      chargeOsc.connect(chargeGain);
      chargeOsc.start();

      const lfoGain = ctx.createGain();
      lfoGain.gain.value = 15;
      chargeLFO = ctx.createOscillator();
      chargeLFO.frequency.value = 10;
      chargeLFO.connect(lfoGain);
      lfoGain.connect(chargeOsc.frequency);
      chargeLFO.start();
    }

    function updateChargeSound(lv) {
      if (!chargeOsc || !audioCtx) return;
      const freq = 80 + (lv - 1) * 130;
      const t = audioCtx.currentTime;
      chargeOsc.frequency.cancelScheduledValues(t);
      chargeOsc.frequency.setValueAtTime(chargeOsc.frequency.value, t);
      chargeOsc.frequency.setTargetAtTime(freq, t, 0.08);
    }

    function stopChargeSound() {
      if (!chargeGain || !audioCtx) return;
      chargeGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
      const osc = chargeOsc, lfo = chargeLFO, gain = chargeGain;
      chargeOsc = null; chargeLFO = null; chargeGain = null;
      setTimeout(() => {
        try { osc.stop(); } catch(e) {}
        try { lfo.stop(); } catch(e) {}
        gain.disconnect();
      }, 300);
    }

    function playSad(gen, onDone) {
      const ctx = getAudioCtx();
      const t = ctx.currentTime;
      const notes = [659, 587, 523, 494, 440];
      const step = 0.28;
      notes.forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        const s    = t + i * step;
        const dur  = i === notes.length - 1 ? 0.65 : step + 0.05;
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, s);
        gain.gain.linearRampToValueAtTime(0.25, s + 0.03);
        gain.gain.setValueAtTime(0.25, s + dur - 0.08);
        gain.gain.linearRampToValueAtTime(0, s + dur);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(s);
        osc.stop(s + dur);
      });
      const total = (notes.length - 1) * step + 0.75;
      setTimeout(() => { if (generation === gen) onDone(); }, total * 1000);
    }

    function playSuccess(gen, onDone) {
      const ctx = getAudioCtx();
      const t = ctx.currentTime;
      const notes = [392, 523, 659, 784, 1047];
      const step = 0.12;
      notes.forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        const s    = t + i * step;
        const dur  = i === notes.length - 1 ? 0.55 : step + 0.02;
        osc.type = 'triangle';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, s);
        gain.gain.linearRampToValueAtTime(0.28, s + 0.012);
        gain.gain.setValueAtTime(0.28, s + dur - 0.04);
        gain.gain.linearRampToValueAtTime(0, s + dur);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(s);
        osc.stop(s + dur);
      });
      const total = (notes.length - 1) * step + 0.6;
      setTimeout(() => { if (generation === gen) onDone(); }, total * 1000);
    }

    function playTriumph(gen, onDone) {
      const ctx = getAudioCtx();
      const t = ctx.currentTime;
      const seq = [
        [392, 0.13], [392, 0.13], [392, 0.13], [523, 0.42],
        [659, 0.13], [784, 0.13], [1047, 0.42],
        [784, 0.13], [1047, 0.75]
      ];
      let pos = t;
      seq.forEach(([freq, dur]) => {
        const gain   = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 2200;
        [1, 1.005].forEach(detune => {
          const osc = ctx.createOscillator();
          osc.type = 'sawtooth';
          osc.frequency.value = freq * detune;
          osc.connect(gain);
          osc.start(pos);
          osc.stop(pos + dur);
        });
        gain.gain.setValueAtTime(0, pos);
        gain.gain.linearRampToValueAtTime(0.18, pos + 0.015);
        gain.gain.setValueAtTime(0.18, pos + dur - 0.025);
        gain.gain.linearRampToValueAtTime(0, pos + dur);
        gain.connect(filter);
        filter.connect(ctx.destination);
        pos += dur;
      });
      const total = pos - t + 0.3;
      setTimeout(() => { if (generation === gen) onDone(); }, total * 1000);
    }

    function paint() {
      allBarSets.forEach(set => {
        set.forEach((b, i) => {
          const barLevel = i + 1;
          b.classList.remove('filled', 'current');
          if (barLevel < level)  b.classList.add('filled');
          if (barLevel === level) b.classList.add('current');
        });
      });
    }

    function clearBars() {
      allBarSets.forEach(set =>
        set.forEach(b => b.classList.remove('filled', 'current'))
      );
    }

    function goIdle() {
      setCmd('CHARYOT!');
      captureSnap();
      vid.onended   = null;
      vid.oncanplay = null;
      vid.loop      = false;
      vid.muted     = true;
      vid.src       = 'B0.mp4';

      vid.oncanplay = () => {
        vid.oncanplay = null;
        releaseSnap();
        vid.play().catch(() => {});
      };

      vid.onended = () => {
        vid.onended = null;
        if (vid.duration && isFinite(vid.duration))
          vid.currentTime = Math.max(0, vid.duration - 0.05);
        setCmd('SIJAK!');
      };
    }

    function startHold() {
      if (holding || playing) return;
      generation++;
      vid.onended   = null;
      vid.oncanplay = null;
      releaseSnap();
      setCmd('');
      holding   = true;
      level     = 1;
      direction = 1;
      paint();
      startChargeSound();

      ticker = setInterval(() => {
        level += direction;
        if (level >= 5) { level = 5; direction = -1; }
        else if (level <= 1) { level = 1; direction = 1; }
        paint();
        updateChargeSound(level);
      }, STEP);
    }

    function endHold() {
      if (!holding) return;
      holding = false;
      clearInterval(ticker);
      ticker = null;
      stopChargeSound();

      const lv  = level;
      const gen = generation;
      level   = 0;
      playing = true;

      captureSnap();
      vid.onended   = null;
      vid.oncanplay = null;
      vid.loop      = false;
      vid.muted     = false;
      vid.src       = videoForLevel(lv);
      vid.currentTime = 0;

      vid.oncanplay = () => {
        vid.oncanplay = null;
        releaseSnap();
        vid.play().catch(() => {});
      };

      vid.onended = () => {
        vid.onended = null;
        playing = false;
        clearBars();
        if (vid.duration && isFinite(vid.duration))
          vid.currentTime = Math.max(0, vid.duration - 0.05);
        setCmd('KYONG YE!');
        const playSound = lv <= 2 ? playSad : lv <= 4 ? playSuccess : playTriumph;
        setTimeout(() => {
          if (generation !== gen) return;
          setCmd('HAE SAN!');
          playSound(gen, () => setTimeout(() => {
            if (generation === gen) goIdle();
          }, 700));
        }, 750);
      };
    }

    goIdle();

    // ---- events ----
    document.addEventListener('mousedown',  startHold);
    document.addEventListener('mouseup',    endHold);
    document.addEventListener('mouseleave', endHold);

    document.addEventListener('touchstart', e => { e.preventDefault(); startHold(); }, { passive: false });
    document.addEventListener('touchend',   e => { e.preventDefault(); endHold();   }, { passive: false });
    document.addEventListener('touchcancel', endHold);
  </script>
</body>
</html>
